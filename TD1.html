<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="fr" lang="fr">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Mon Site Web - Ingrid SEGLA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }

        .clignotant {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
            animation: blink-color 1s infinite;
        }

        @keyframes blink-color {
            0% { color: blue; }
            50% { color: red; }
            100% { color: blue; }
        }

        .subtitle {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
        }

        .logo-centré {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
        }

        .content-left {
            text-align: left;
            margin-top: 50px;
            border-top: 2px solid #ccc;
            padding-top: 20px;
        }
        
        .profile-pic {
            width: 150px;
            display: block;
            margin: 10px 0;
        }

        #corbeau-renard-section {
            display: none;
            background: #f0f0f0;
            padding: 15px;
            margin-top: 20px;
        }

        #corbeau-renard-section:target {
            display: block;
        }

        .loisirs-p {
            text-align: justify;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div>
        <h1 class="clignotant">Bonjour tout le monde</h1>
        <p class="subtitle">Bienvenue à l'ENEAM</p>
        <img src="ENEAM.png" alt="Logo ENEAM" class="logo-centré" />
                </p>
        
        
    </div>

</body>
</html>
