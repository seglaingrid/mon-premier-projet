<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portail Web - UAC / ENEAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Évite le double défilement de la page */
            height: 100vh;
        }

        /* Barre supérieure (Header) */
        .top-header {
            background-color: #0d3b66; /* Bleu foncé de l'ENEAM/UAC */
            color: white;
            padding: 10px 20px;
            border-bottom: 4px solid #f4a261; /* Ligne orange d'accentuation */
            height: 70px;
        }
        .top-header h1 {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }
        .logo-img {
            height: 50px;
            width: auto;
            object-fit: contain;
            background-color: white;
            padding: 2px;
            border-radius: 4px;
        }

        /* Disposition principale */
        .main-container {
            height: calc(100vh - 70px);
        }

        /* Barre latérale (Sidebar Menu) */
        .sidebar {
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            height: 100%;
            padding-top: 15px;
            width: 240px;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .menu-title {
            font-size: 12px;
            font-weight: bold;
            color: #6c757d;
            padding: 10px 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-link-custom {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #495057;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }
        .nav-link-custom:hover {
            background-color: #f8f9fa;
            color: #0d3b66;
        }
        .nav-link-custom.active-menu {
            background-color: #e8f0fe;
            color: #1a73e8;
            border-left: 4px solid #1a73e8;
            font-weight: bold;
        }
        .nav-link-custom i {
            margin-right: 12px;
            font-size: 16px;
        }

        /* Zone de contenu principal */
        .content-area {
            flex-grow: 1;
            height: 100%;
            background-color: #f8f9fa;
            position: relative;
        }

        /* Cadre iFrame pour charger les pages HTML externes */
        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-header d-flex justify-content-between align-items-center">
        <img src="UAC.png" alt="Logo UAC" class="logo-img">
        
        <h1 class="text-center flex-grow-1">Bienvenue dans mon site web</h1>
        
        <img src="ENEAM.png" alt="Logo ENEAM" class="logo-img">
    </div>

    <div class="d-flex main-container">
        
        <div class="sidebar">
            <div class="menu-title"><i class="bi bi-list"></i> Menu</div>
            
            <a href="accueil.html" target="contentFrame" class="nav-link-custom active-menu" onclick="changeActive(this)">
                <i class="bi bi-house-door-fill"></i> Page 1
            </a>
            <a href="TD1.html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-file-earmark-code"></i> TP 1
            </a>
            <a href="TD2.html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-file-earmark-code"></i> TP 2
            </a>
            <a href="TD3.html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-file-earmark-code"></i> TP 3
            </a>
            <a href="Liste .html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-list-ul"></i> Listes
            </a>
            <a href="Tableau 1 .html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-table"></i> Tableau
            </a>
            <a href="Formulaire .html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-wpforms"></i> Formulaire
            </a>
            <a href="CV.html" target="contentFrame" class="nav-link-custom" onclick="changeActive(this)">
                <i class="bi bi-person-badge-fill"></i> CV
            </a>
        </div>

        <div class="content-area">
            <iframe src="accueil.html" name="contentFrame" class="content-iframe"></iframe>
        </div>

    </div>

    <script>
        function changeActive(element) {
            // Supprimer la classe active de tous les liens
            const links = document.querySelectorAll('.nav-link-custom');
            links.forEach(link => link.classList.remove('active-menu'));
            
            // Ajouter la classe active sur le lien cliqué
            element.classList.add('active-menu');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
